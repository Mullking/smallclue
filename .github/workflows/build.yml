name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf automake cmake pkg-config \
            libssl-dev zlib1g-dev libcurl4-openssl-dev libbsd-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install autoconf automake cmake pkg-config openssl@3

      - name: Fetch dependencies
        run: ./fetch_dependencies.sh

      - name: Configure OpenSSH (Linux)
        if: runner.os == 'Linux'
        working-directory: third-party/openssh
        run: env LDFLAGS=-static ./configure --sysconfdir=/etc/ssh

      - name: Configure OpenSSH (macOS)
        if: runner.os == 'macOS'
        working-directory: third-party/openssh
        run: |
          BREW_OPENSSL_PREFIX="$(brew --prefix openssl@3)"
          env \
            CPPFLAGS="-I$BREW_OPENSSL_PREFIX/include" \
            LDFLAGS="-L$BREW_OPENSSL_PREFIX/lib" \
            PKG_CONFIG_PATH="$BREW_OPENSSL_PREFIX/lib/pkgconfig" \
            OPENSSL_BIN="$BREW_OPENSSL_PREFIX/bin/openssl" \
            ./configure --sysconfdir=/etc/ssh

      - name: Configure
        run: cmake -S . -B build

      - name: Build
        run: cmake --build build -j"$(getconf _NPROCESSORS_ONLN)"

      - name: Smoke test
        run: |
          ./build/smallclue rsync --version
          ./build/smallclue ls --help || true
